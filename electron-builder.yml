directories:
  buildResources: build
  output: dist

# Bundle the GUI, the engine source, the cat + fonts, and the production node_modules.
# Only docs / dev junk are stripped. (electron-builder always ships production dependencies.)
files:
  - electron/**/*
  - src/**/*
  - assets/**/*
  - fonts/**/*
  - package.json
  - '!scripts/**'
  - '!docs/**'
  - '!images/**'
  - '!.github/**'
  - '!build/**'
  - '!**/*.md'
  - '!.gitignore'
  - '!electron-builder.yml'

# These are opened off real disk â€” by ffmpeg (cat.GIF), by @napi-rs/canvas's native font
# loader (the .ttf/.woff2), and as native .node addons (usb, canvas) â€” so they cannot live
# inside the asar archive.
asarUnpack:
  - '**/*.node'
  - assets/**
  - fonts/**
  - node_modules/@ffmpeg-installer/**
  - node_modules/@napi-rs/**
  - node_modules/usb/**

# Extend-screen runtime assets (loaded off real disk by the capture window / PowerShell, so they
# can't live inside app.asar). The app resolves these at process.resourcesPath/vdd when packaged.
extraResources:
  - from: scripts/vdd
    to: vdd
    filter: ['**/*']
  # VDD driver + nefconw + install/uninstall scripts (installed by the NSIS hooks during setup).
  # nefconw.exe is fetched by the GitHub Action before build (not committed); see .github/workflows.
  - from: vendor/vdd
    to: driver
    filter: ['**/*']
  - from: build/meow.cmd
    to: meow/meow.cmd
  - from: SKILLS
    to: SKILLS
    filter: ['**/*']

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  # perMachine (admin install) is required so the installer can install the display driver +
  # register the SYSTEM scheduled tasks. One UAC at install; on/off afterwards needs no UAC.
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: æ‘¸é±¼ç›‘æŽ§
  include: build/installer.nsh
  artifactName: meow-monitor-${version}-setup.${ext}

# electron-updater is NOT used (the app checks GitHub Releases itself), but keeping the feed
# config here lets the build still emit latest.yml and makes a future migration trivial.
publish:
  provider: github
  owner: Utter-pulsar
  repo: meow-monitor
