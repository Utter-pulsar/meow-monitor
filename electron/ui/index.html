<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>摸鱼监控</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- draggable title bar -->
    <header class="titlebar">
      <div class="titlebar-left">
        <img id="bar-cat" class="bar-cat" alt="" />
        <span class="bar-title">摸鱼监控</span>
      </div>
      <div class="win-controls">
        <button id="btn-min" class="win-btn" title="最小化">–</button>
        <button id="btn-close" class="win-btn win-close" title="关闭">×</button>
      </div>
    </header>

    <main class="content">
      <section class="hero">
        <img id="hero-cat" class="hero-cat" alt="月薪喵" />
        <h1 class="app-name">摸鱼监控</h1>
        <p class="app-sub">把小猫和电脑状态丢到副屏上 🐟</p>
      </section>

      <section class="mode">
        <button id="mode-dash" class="seg">📊&nbsp;仪表盘</button>
        <button id="mode-ext" class="seg">🖥️&nbsp;扩展屏</button>
      </section>

      <section id="arr-box" class="arr-box" hidden>
        <div class="arr-head"><span>仪表盘布局</span><small>拖动卡片调整顺序</small></div>
        <div class="arr-grid" id="arr-grid"></div>
      </section>

      <section id="cyber-box" class="cyber-box collapsed" hidden>
        <button id="cyber-toggle" class="cyber-toggle" type="button" aria-expanded="false" title="展开或固定赛博消息栏">
          <span class="cyber-toggle-title">赛博消息栏</span>
          <span id="cyber-pin" class="cyber-pin">临时展开</span>
        </button>
        <div id="cyber-body" class="cyber-body">
          <div class="cyber-head">
            <div>
              <span>赛博消息栏</span>
              <small>左侧显示月薪喵，还是 AI / agent 汇报流</small>
            </div>
            <button id="cyber-clear" class="btn-mini">清空消息</button>
          </div>

          <div class="cyber-mode" id="cyber-mode">
            <button id="left-cat" class="seg">🐱&nbsp;月薪喵</button>
            <button id="left-cyber" class="seg">📡&nbsp;赛博消息栏</button>
          </div>

          <label class="row row-tight">
            <span class="row-label">叮！提醒动画<small>新消息到来时，从消息右侧弹一下</small></span>
            <span class="switch"><input type="checkbox" id="sw-cyber-burst" /><span class="knob"></span></span>
          </label>

          <div id="cyber-preview" class="cyber-preview empty">
            <div class="cyber-preview-head">
              <span>消息历史</span>
              <small id="cyber-unseen">0 条新消息</small>
            </div>
            <div id="cyber-empty" class="cyber-empty">目前还没有消息。</div>
            <div id="cyber-list" class="cyber-list" tabindex="0" aria-label="赛博消息历史"></div>
          </div>
        </div>
      </section>

      <section class="run-row">
        <button id="arr-open" class="btn-open" hidden>🖥️&nbsp;显示设置</button>
        <div id="status" class="status-card stopped">
          <span class="dot"></span>
          <span id="status-text" class="status-text">未运行</span>
          <label class="switch" id="run-switch"><input type="checkbox" id="sw-run" /><span class="knob"></span></label>
        </div>
      </section>

      <section id="qual-box" class="qual-box" hidden>
        <div class="qual-head"><span>清晰度</span><span id="qual-val" class="qual-val"></span></div>
        <div class="qual-track" id="qual-track">
          <div class="qual-fill" id="qual-fill"></div>
          <div class="qual-knob" id="qual-knob"></div>
        </div>
        <div class="qual-ends"><span>流畅 · 糊</span><span>清晰 · 慢</span></div>
      </section>

      <section class="settings">
        <label class="row">
          <span class="row-label">手动黑屏<small>保持运行；扩展屏仍保留在系统中</small></span>
          <span class="switch"><input type="checkbox" id="sw-blackout" /><span class="knob"></span></span>
        </label>
        <label class="row">
          <span class="row-label">开机自启<small>登录系统时自动运行</small></span>
          <span class="switch"><input type="checkbox" id="sw-autolaunch" /><span class="knob"></span></span>
        </label>
        <label class="row">
          <span class="row-label">最小化到托盘<small>关闭窗口后在后台继续运行</small></span>
          <span class="switch"><input type="checkbox" id="sw-minimize" /><span class="knob"></span></span>
        </label>
      </section>

      <footer class="foot">
        <button id="btn-update" class="btn-update">检查更新</button>
        <span id="version" class="version">v0.0.0</span>
      </footer>
      <div id="dl-bar" class="dl-bar" hidden><div id="dl-fill" class="dl-fill"></div></div>
      <p id="update-msg" class="update-msg"></p>
      <div id="scroll-thumb" class="doodle-scrollthumb"><div class="doodle-scrollthumb-bar"></div></div>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
